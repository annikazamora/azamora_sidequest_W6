<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      GBDA302 Week 6 - Example 5: Project Organization - Classes & External

    </title>

    <style>
      body {
        margin: 0;
        overflow: hidden;

      ASSET CREDITS
      ============================================================

      Background Layers:
        - Background: https://opengameart.org/content/summer-pixel-art-seamless-background

      Sprites:
        - Fox: https://opengameart.org/content/fox-wolf-pack-rework
        - Cow: https://kettoman.itch.io/pixel-farming-base-pack-animals-crops-tileset?download
        - Bell: Drawn by Annika using: https://www.piskelapp.com/p/create/sprite/
        - Fire: https://captainskolot.itch.io/9-fire-animation-pixelart-pixel-art-sprite-fire-spells-pack-rpg

      Tiles:
        - All tiles: https://dustdfg.itch.io/pixel-art-top-down-tileset?download#google_vignette
        
      UI:
        - Bitmap Font from: https://stmn.itch.io/font2bitmap

      Audio:
        - music.wav: https://pizzadoggy.itch.io/cozy-tunes

      Libraries:
        - p5.js: https://p5js.org/
